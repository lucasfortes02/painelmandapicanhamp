<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectar ao Obsidian - Manda Picanha</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #07090F;
            color: #EEF2FF;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: #0F1320;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #1E2840;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 500px;
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            color: #6B7A9F;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .btn {
            background: #4F8EF7;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            background: #3b7ddd;
            box-shadow: 0 5px 15px rgba(79, 142, 247, 0.4);
        }
        .path {
            font-family: monospace;
            background: #07090F;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            display: block;
            margin-top: 20px;
            color: #4F8EF7;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🥩 ➜ 💜</div>
        <h1>Conectar ao Obsidian</h1>
        <p>Clique no botão abaixo para abrir a pasta do projeto automaticamente no seu Obsidian.</p>
        
        <a href="obsidian://open?path=c%3A%5CUsers%5Clucas%5COneDrive%5CDocumentos%5Cteste_antigravity" class="btn">
            ABRIR PROJETO NO OBSIDIAN
        </a>

        <span class="path">Destino: c:\Users\lucas\OneDrive\Documentos\teste_antigravity</span>
    </div>
</body>
</html>
